name: Wait for SHA
description: Polls a URL until its `x-commit-sha` meta tag matches the expected commit SHA.
inputs:
  url:
    description: Public URL to poll.
    required: true
  expected:
    description: Expected commit SHA (full).
    required: true
  attempts:
    description: Number of polls before failing.
    required: false
    default: "60"
  interval:
    description: Seconds between polls.
    required: false
    default: "10"
runs:
  using: composite
  steps:
    - name: Poll
      shell: bash
      env:
        URL: ${{ inputs.url }}
        EXPECTED: ${{ inputs.expected }}
        ATTEMPTS: ${{ inputs.attempts }}
        INTERVAL: ${{ inputs.interval }}
      run: |
        set -uo pipefail
        seen=""
        for i in $(seq 1 "$ATTEMPTS"); do
          html=$(curl -fsSL --max-time 15 "$URL" 2>/dev/null || true)
          seen=$(printf '%s' "$html" | grep -oE 'name="x-commit-sha" content="[0-9a-f]+"' | head -1 | sed -E 's/.*content="([^"]+)".*/\1/' || true)
          if [ "$seen" = "$EXPECTED" ]; then
            echo "::notice title=$URL::serving $seen (try $i)"
            exit 0
          fi
          echo "[$i/$ATTEMPTS] $URL serving '${seen:-<no-sha>}', waiting for $EXPECTED"
          sleep "$INTERVAL"
        done
        echo "::error title=$URL::timeout after $((ATTEMPTS * INTERVAL))s; last seen '${seen:-<no-sha>}', expected '$EXPECTED'"
        exit 1
