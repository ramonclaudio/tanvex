name: Deploys

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploys-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vercel:
    name: Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/wait-for-sha
        with:
          url: https://tanvex-demo.vercel.app
          expected: ${{ github.sha }}

  cloudflare:
    name: Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/wait-for-sha
        with:
          url: https://tanvex.hello-8fa.workers.dev
          expected: ${{ github.sha }}
