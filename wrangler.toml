name = "tanvex"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

# Workers Builds reads `build.command` and runs it after install. Bun version
# is detected from `bun.lock`. Override with the `BUN_VERSION` env var on the
# Cloudflare Worker if you need a specific bun.
[build]
command = "bun run build"

# Env vars: this Vite-built app reads `process.env.X` at BUILD time (via Vite's
# `define` block in `vite.config.ts`), not at request time. Set them as
# build-time env vars in the Cloudflare dashboard:
#   Workers & Pages -> tanvex -> Settings -> Builds -> Variables and secrets
# Required: CONVEX_DEPLOYMENT, VITE_CONVEX_URL, VITE_CONVEX_SITE_URL,
# SITE_URL, VITE_SITE_URL. Backend secrets (BETTER_AUTH_SECRET, RESEND_*)
# live on the Convex deployment, see `.env.convex.example`.
#
# Don't add a `[vars]` block here for these — runtime bindings can't reach
# values that Vite has already inlined into the bundle.
