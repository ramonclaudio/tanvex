name = "tanvex"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

# Workers Builds reads `build.command` and runs it after install. Bun version
# is detected from `bun.lock`. Override with the `BUN_VERSION` env var on the
# Cloudflare Worker if you need a specific bun (set via dashboard or
# `bunx wrangler secret put BUN_VERSION`).
[build]
command = "bun run build"

# Public env vars baked into the Worker. Update these for your own deploy.
# Backend secrets (BETTER_AUTH_SECRET, RESEND_API_KEY, etc.) live on the
# Convex deployment, not here. See `.env.convex.example`.
[vars]
CONVEX_DEPLOYMENT = "prod:reminiscent-woodpecker-169"
VITE_CONVEX_URL = "https://reminiscent-woodpecker-169.convex.cloud"
VITE_CONVEX_SITE_URL = "https://reminiscent-woodpecker-169.convex.site"
SITE_URL = "https://tanvex.hello-8fa.workers.dev"
VITE_SITE_URL = "https://tanvex.hello-8fa.workers.dev"
